name: CD

on:
  push:
    branches: [terraform]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      app_image: ${{ steps.build-app.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push app image
        id: build-app
        run: |
          IMAGE=$ACR_LOGIN_SERVER/doc-parser/app:${{ github.sha }}
          docker build -t $IMAGE .
          docker tag $IMAGE $ACR_LOGIN_SERVER/doc-parser/app:latest
          docker push $IMAGE
          docker push $ACR_LOGIN_SERVER/doc-parser/app:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update app container image
        # Only the app container image is updated; qdrant and ollama sidecars keep
        # running undisturbed — no data loss, no vector index reload.
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --container-name app \
            --image $ACR_LOGIN_SERVER/doc-parser/app:${{ github.sha }}

      - name: Wait for revision to reach Running state
        run: |
          echo "Polling Container App revision state (max 15 min)..."
          REVISION=$(az containerapp show \
            --name $CONTAINER_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --query "properties.latestRevisionName" \
            --output tsv)
          echo "Latest revision: $REVISION"

          for i in $(seq 1 60); do
            STATE=$(az containerapp revision show \
              --name $CONTAINER_APP_NAME \
              --resource-group $AZURE_RESOURCE_GROUP \
              --revision "$REVISION" \
              --query "properties.runningState" \
              --output tsv)
            echo "Attempt $i/60 — runningState=$STATE"
            if [ "$STATE" = "Running" ]; then
              echo "Revision is active and running."
              exit 0
            fi
            if [ "$STATE" = "Failed" ] || [ "$STATE" = "Stopped" ]; then
              echo "Revision reached terminal state: $STATE"
              exit 1
            fi
            sleep 15
          done
          echo "Revision did not reach Running state within 15 minutes."
          exit 1

      - name: Smoke test
        run: |
          FQDN=$(az containerapp show \
            --name $CONTAINER_APP_NAME \
            --resource-group $AZURE_RESOURCE_GROUP \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Testing https://$FQDN/health"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1
